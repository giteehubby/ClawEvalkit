<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Skill 自进化 — Benchmark 调研</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
  header { background: linear-gradient(135deg, #1a1f2e 0%, #16213e 100%); padding: 32px 40px; border-bottom: 1px solid #2d3748; }
  header h1 { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 6px; }
  header p { color: #94a3b8; font-size: 14px; }
  .stats-bar { display: flex; gap: 24px; padding: 20px 40px; background: #141820; border-bottom: 1px solid #2d3748; flex-wrap: wrap; }
  .stat { text-align: center; }
  .stat-num { font-size: 28px; font-weight: 700; color: #60a5fa; }
  .stat-label { font-size: 12px; color: #64748b; margin-top: 2px; }
  .controls { padding: 16px 40px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; background: #0f1117; border-bottom: 1px solid #1e2535; }
  .filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid #2d3748; background: transparent; color: #94a3b8; cursor: pointer; font-size: 13px; transition: all 0.2s; }
  .filter-btn:hover, .filter-btn.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }
  .search-box { padding: 6px 14px; border-radius: 20px; border: 1px solid #2d3748; background: #1e2535; color: #e2e8f0; font-size: 13px; width: 220px; outline: none; }
  .search-box:focus { border-color: #3b82f6; }
  .main { padding: 24px 40px; }
  .section-title { font-size: 13px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
  .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
  .chart-card { background: #141820; border: 1px solid #1e2535; border-radius: 12px; padding: 20px; }
  .chart-card h3 { font-size: 13px; color: #94a3b8; margin-bottom: 16px; font-weight: 500; }
  .bar-row { display: flex; align-items: center; margin-bottom: 10px; gap: 10px; }
  .bar-label { font-size: 12px; color: #94a3b8; width: 130px; flex-shrink: 0; text-align: right; }
  .bar-track { flex: 1; height: 22px; background: #1e2535; border-radius: 4px; overflow: visible; position: relative; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
  .bar-value { font-size: 12px; color: #cbd5e1; white-space: nowrap; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 16px; margin-top: 8px; }
  .card { background: #141820; border: 1px solid #1e2535; border-radius: 12px; padding: 20px; transition: border-color 0.2s, transform 0.2s; cursor: pointer; }
  .card:hover { border-color: #3b82f6; transform: translateY(-2px); }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .card-name { font-size: 16px; font-weight: 700; color: #fff; }
  .card-year { font-size: 12px; color: #64748b; background: #1e2535; padding: 2px 8px; border-radius: 10px; }
  .card-full-name { font-size: 12px; color: #64748b; margin-bottom: 10px; line-height: 1.4; }
  .card-meta { display: flex; gap: 16px; margin-bottom: 12px; }
  .meta-item { font-size: 12px; color: #94a3b8; }
  .meta-item span { color: #60a5fa; font-weight: 600; }
  .category-badge { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; margin-bottom: 10px; }
  .findings { margin-top: 10px; }
  .finding { font-size: 12px; color: #94a3b8; padding: 4px 0; padding-left: 12px; position: relative; line-height: 1.5; }
  .finding::before { content: '›'; position: absolute; left: 0; color: #3b82f6; }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 8px; background: #1e2535; color: #64748b; }
  .links { display: flex; gap: 10px; margin-top: 12px; }
  .link-btn { font-size: 11px; padding: 3px 10px; border-radius: 6px; border: 1px solid #2d3748; color: #94a3b8; text-decoration: none; transition: all 0.2s; }
  .link-btn:hover { border-color: #3b82f6; color: #60a5fa; }
  .domains-list { font-size: 11px; color: #64748b; margin-top: 6px; line-height: 1.6; }
  .hidden { display: none; }

  /* category colors */
  .cat-skill_evaluation { background: #1e3a5f; color: #60a5fa; }
  .cat-self_evolution { background: #1a3a2a; color: #34d399; }
  .cat-lifelong_learning { background: #2d1f4a; color: #a78bfa; }
  .cat-agent_evolution { background: #3a2a1a; color: #fb923c; }
  .cat-benchmark_evolution { background: #3a1a2a; color: #f472b6; }
  .cat-skill_creation { background: #1a3a3a; color: #22d3ee; }
  .cat-memory_evolution { background: #2a3a1a; color: #86efac; }
  .cat-skill_ecosystem { background: #3a3a1a; color: #fbbf24; }
  .cat-software_engineering { background: #1f2a3a; color: #7dd3fc; }
  .cat-coding_agent { background: #2a1f3a; color: #c4b5fd; }
  .cat-ml_engineering { background: #3a1f1f; color: #fca5a5; }
  .cat-real_world_tasks { background: #1f3a2a; color: #6ee7b7; }
  .cat-tool_use { background: #3a2a1f; color: #fdba74; }
  .cat-multimodal_agent { background: #1f2a3a; color: #93c5fd; }

  .tooltip { position: fixed; background: #1e2535; border: 1px solid #3b82f6; border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #e2e8f0; pointer-events: none; z-index: 1000; max-width: 280px; display: none; }
</style>
</head>
<body>

<header>
  <h1>Agent Skill 自进化 — Benchmark 调研全景</h1>
  <p>涵盖 Skill 评估、自进化、终身学习、工具使用等方向 · 更新于 2026-03-18</p>
</header>

<div class="stats-bar">
  <div class="stat"><div class="stat-num">15</div><div class="stat-label">Benchmarks</div></div>
  <div class="stat"><div class="stat-num">2024–2025</div><div class="stat-label">时间跨度</div></div>
  <div class="stat"><div class="stat-num">6,000+</div><div class="stat-label">总任务数</div></div>
  <div class="stat"><div class="stat-num">14</div><div class="stat-label">研究方向</div></div>
</div>

<div class="controls">
  <input class="search-box" type="text" placeholder="搜索 benchmark..." id="searchInput" oninput="filterCards()">
  <button class="filter-btn active" onclick="filterBy('all', this)">全部</button>
  <button class="filter-btn" onclick="filterBy('skill_evaluation', this)">Skill 评估</button>
  <button class="filter-btn" onclick="filterBy('self_evolution', this)">自进化</button>
  <button class="filter-btn" onclick="filterBy('lifelong_learning', this)">终身学习</button>
  <button class="filter-btn" onclick="filterBy('software_engineering', this)">软件工程</button>
  <button class="filter-btn" onclick="filterBy('tool_use', this)">工具使用</button>
  <button class="filter-btn" onclick="filterBy('real_world_tasks', this)">真实任务</button>
</div>

<div class="main">
  <div class="chart-row">
    <div class="chart-card">
      <h3>任务规模对比（tasks 数量）</h3>
      <div id="taskChart"></div>
    </div>
    <div class="chart-card">
      <h3>研究方向分布</h3>
      <div id="catChart"></div>
    </div>
  </div>

  <div class="section-title">所有 Benchmarks</div>
  <div class="grid" id="cardGrid"></div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
const benchmarks = [
  {
    name: "SkillsBench", full_name: "Benchmarking How Well Agent Skills Work Across Diverse Tasks",
    year: 2025, arxiv: "2602.12670", url: "https://www.skillsbench.ai/",

    domain_list: ["Science","Finance","Healthcare","Cybersecurity","Energy","Software Eng.","Legal","Education","Manufacturing","Logistics","Research"],
    metrics: ["Pass Rate","Deterministic Verifiers"],
    key_findings: ["Curated Skills raise avg pass rate by +16.2pp","Self-generated Skills provide negligible or negative benefit","Healthcare benefits most; Software Eng. benefits least","First peer-reviewed benchmark for agent skill evaluation"],
    tags: ["skill","multi-domain","evaluation"]
  },
  {
    name: "SE-Bench", full_name: "Benchmarking Self-Evolution with Knowledge Internalization",

    category: "self_evolution", tasks: null, domains: 1,
    domain_list: ["Coding (obfuscated NumPy API)"],
    metrics: ["Closed-book Accuracy","Knowledge Internalization Rate"],
    key_findings: ["Obfuscated API prevents memorization cheating","Closed-book paradigm forces true knowledge internalization","Reveals gap between context-use and genuine learning","Rigorous diagnostic platform for self-evolution"],

  {
    name: "StuLife", full_name: "Building Self-Evolving Agents via Experience-Driven Lifelong Learning",
    year: 2025, arxiv: "2508.19005", url: "https://huggingface.co/datasets/ecnu-icalk/ELL-StuLife",
    institution: "ECNU",

    domain_list: ["Academic Development","Personal Development","Social Development"],
    metrics: ["Memory Retention","Skill Transfer","Self-motivated Behavior"],
    key_findings: ["Simulates student's full college journey across 3 phases, 10 scenarios","4 paradigm shifts: Simulation→Reality, Passive→Proactive, Context→Memory, Imitation→Learning","Introduces ELL (Experience-driven Lifelong Learning) framework","Evaluates long-horizon experience-driven growth"],
    tags: ["lifelong-learning","memory","experience"]
  },
  {
    name: "AgentGym", full_name: "Evolving Large Language Model-based Agents across Diverse Environments",
    year: 2024, arxiv: "2406.04151", url: "https://agentgym.github.io/",
    institution: "NTU / NUS",
    category: "agent_evolution", tasks: 89, domains: 14,
    domain_list: ["Web","Embodied","Game","Tool Use","QA","Code","Math","Science","Navigation","Shopping","Social","Creative","Planning","Reasoning"],
    metrics: ["Task Success Rate","Generalization Score"],
    key_findings: ["14 environment types, 89 task types","AgentEvol enables self-evolution without human supervision","Agents generalize skills to unseen tasks after evolution","Unified HTTP-based architecture for standardized evaluation"],

  },
  {
    name: "TRACE", full_name: "Towards Self-Evolving Benchmarks: Synthesizing Agent Trajectories via Test-Time Exploration",

    institution: "ICLR 2026",
    category: "benchmark_evolution", tasks: null, domains: 3,
    domain_list: ["Coding","Math (AIME-2024)","Reasoning"],
    metrics: ["Task Complexity","Trajectory Validity","Reproduce Rate"],
    key_findings: ["Benchmark Complexity Evolution (TRACE) framework","Agents explore and evolve tasks to higher difficulty","Validate-by-Reproduce paradigm ensures trajectory validity","Paradigm shift from static to dynamic self-evolving benchmarks"],

  },

    year: 2025, arxiv: "2512.23880", url: "https://arxiv.org/abs/2512.23880",
    institution: "Unknown",
    category: "skill_creation", tasks: 116, domains: 2,
    domain_list: ["Materials Science","Chemistry"],
    metrics: ["Task Success Rate"],
    key_findings: ["93.3% success rate with GPT-5 vs 35.4% without evolution (+57.9pp)","Cumulative skill building: each skill builds on prior ones","SciSkillBench: 116 science research tasks","Autonomous skill development and evolution loop"],
    tags: ["skill-creation","science","cumulative"]
  },
  {
    name: "Evo-Memory", full_name: "Benchmarking LLM Agent Test-time Learning with Self-Evolving Memory",
    year: 2025, arxiv: "2511.20857", url: "https://arxiv.org/abs/2511.20857",
    institution: "Unknown",
    category: "memory_evolution", tasks: null, domains: null,
    domain_list: ["Sequential Tasks","Streaming Tasks"],
    metrics: ["Memory Retention","Adaptation Rate","Streaming Performance"],
    key_findings: ["Streaming benchmark for self-evolving memory evaluation","Sequential task streams test memory update and retention","Evaluates test-time learning without retraining","Comprehensive framework for memory evolution"],
    tags: ["memory","test-time-learning","streaming"]
  },
  {
    name: "AgentSkillOS", full_name: "Organizing, Orchestrating, and Benchmarking Agent Skills at Ecosystem Scale",
    year: 2025, arxiv: "2603.02176", url: "https://arxiv.org/abs/2603.02176",
    institution: "Unknown",
    category: "skill_ecosystem", tasks: null, domains: null,
    domain_list: ["Multi-domain Skill Ecosystem"],
    metrics: ["Skill Retrieval Accuracy","Task Success Rate","Ecosystem Scale Performance"],
    key_findings: ["AgentSkillOS outperforms native skill provisioning at scale","Tree-based retrieval approximates oracle skill selection","Performance advantage persists as skill ecosystem scales","Addresses skill organization at ecosystem level"],
    tags: ["skill-ecosystem","retrieval","orchestration"]
  },
  {
    name: "SWE-Bench Pro", full_name: "SWE-Bench Pro: Can AI Agents Solve Long-Horizon Software Engineering Tasks?",
    year: 2025, arxiv: null, url: "https://scaleapi.github.io/SWE-bench_Pro-os/",
    institution: "Scale AI",
    category: "software_engineering", tasks: 1865, domains: 1,
    domain_list: ["Software Engineering (41 enterprise repos)"],
    metrics: ["Resolution Rate","Patch Apply Rate"],
    key_findings: ["1,865 human-verified tasks from 41 actively maintained repos","Contamination-resistant design","Long-horizon tasks requiring hours-to-days for human engineers","Multi-file patches across enterprise codebases"],
    tags: ["software-engineering","long-horizon","enterprise"]
  },
  {
    name: "Multi-SWE-Bench", full_name: "Multi-SWE-bench: A Multilingual Benchmark for Issue Resolving",
    year: 2025, arxiv: "2504.02605", url: "https://huggingface.co/papers/2504.02605",
    institution: "ByteDance Seed",
    category: "software_engineering", tasks: 2132, domains: 8,
    domain_list: ["Python","Java","TypeScript","JavaScript","Go","Rust","C","C++"],
    metrics: ["Resolution Rate","Patch Correctness"],
    key_findings: ["2,132 instances curated by 68 expert annotators","First multilingual code issue benchmark (8 languages)","Covers Java, TypeScript, JS, Go, Rust, C, C++","Accompanied by Multi-SWE-RL reinforcement learning dataset"],
    tags: ["software-engineering","multilingual","issue-resolving"]
  },
  {
    name: "Vibe Code Bench", full_name: "Vibe Code Bench: Evaluating AI Models on End-to-End Web Application Development",
    year: 2025, arxiv: "2603.04601", url: "https://www.vals.ai/benchmarks/vibe-code",
    institution: "vals.ai",
    category: "coding_agent", tasks: 100, domains: 1,
    domain_list: ["Web Application Development"],
    metrics: ["Browser Workflow Pass Rate","Substep Accuracy"],
    key_findings: ["100 web app specs (50 public + 50 held-out)","964 browser-based workflows, 10,131 substeps","End-to-end evaluation of vibe coding agents","GPT-5.4 leads at 67.42% overall accuracy"],
    tags: ["coding","web-dev","end-to-end"]
  },
  {
    name: "MLE-Bench Lite", full_name: "MLE-bench: Evaluating Machine Learning Agents on Machine Learning Engineering",
    year: 2025, arxiv: "2410.07095", url: "https://mlebench.com/",
    institution: "OpenAI",
    category: "ml_engineering", tasks: 18, domains: 7,
    domain_list: ["Image Classification","NLP","Time-series","Tabular","Segmentation","Signal Processing","Multimodal"],
    metrics: ["Kaggle Medal Rate","Leaderboard Percentile"],
    key_findings: ["Lite version: 18 tasks, balanced across modalities and difficulty","Full version: 75 Kaggle ML competitions","Tests complete ML workflows: data prep, training, submission","Best agents achieve bronze medal performance on some competitions"],
    tags: ["ml-engineering","kaggle","autonomous"]
  },
  {
    name: "GDPval-AA", full_name: "GDPval: Evaluating AI Model Performance on Real-World Economically Valuable Tasks",
    year: 2025, arxiv: "2510.04374", url: "https://artificialanalysis.ai/evaluations/gdpval-aa",
    institution: "OpenAI / Artificial Analysis",
    category: "real_world_tasks", tasks: 1320, domains: 9,
    domain_list: ["Finance","Legal","Healthcare","Consulting","Engineering","Education","Media","Government","Research"],
    metrics: ["Task Completion Rate","Expert-graded Quality"],
    key_findings: ["1,320 tasks across 44 occupations and 9 industries","Tasks designed by professionals with 14+ years experience","GDPval-AA is Artificial Analysis' primary agentic performance metric","Tests knowledge work: presentations, data analysis, video editing"],
    tags: ["real-world","economic","knowledge-work"]
  },
  {
    name: "Toolathlon", full_name: "The Tool Decathlon: Benchmarking Language Agents for Diverse, Realistic, and Long-Horizon Task Execution",
    year: 2025, arxiv: "2510.25726", url: "https://hkust.mintlify.app/docs/blog/toolathlon",
    institution: "HKUST",
    category: "tool_use", tasks: 108, domains: 32,
    domain_list: ["Google Calendar","Notion","Snowflake","WooCommerce","Kubernetes","BigQuery","...and 26 more apps"],
    metrics: ["Task Success Rate","Deterministic Verifier Score"],
    key_findings: ["108 tasks across 32 real software applications, 604 tools","~20 interaction turns per task on average","Covers everyday to enterprise platforms","Strictly verifiable through dedicated evaluation scripts"],
    tags: ["tool-use","long-horizon","multi-app"]
  },
  {
    name: "MM-ClawBench", full_name: "Benchmarking Hierarchical Capabilities of Multimodal Agents in Professional Software Environments",
    year: 2025, arxiv: "2601.02399", url: "https://arxiv.org/abs/2601.02399",
    institution: "Unknown",
    category: "multimodal_agent", tasks: 436, domains: 6,
    domain_list: ["Science","Engineering","Finance","Healthcare","Legal","Education"],
    metrics: ["Hierarchical Capability Score","Task Success Rate"],
    key_findings: ["436 realistic work and research tasks","First capability hierarchy for professional software agent use","Spans 6 disciplines and 13 core professional software tools","Tests hierarchical multimodal agent capabilities"],
    tags: ["multimodal","professional-software","hierarchical"]
  }
];

const catLabels = {
  skill_evaluation: "Skill 评估", self_evolution: "自进化", lifelong_learning: "终身学习",
  agent_evolution: "Agent 进化", benchmark_evolution: "Benchmark 进化", skill_creation: "Skill 创建",
  memory_evolution: "记忆进化", skill_ecosystem: "Skill 生态", software_engineering: "软件工程",
  coding_agent: "编程 Agent", ml_engineering: "ML 工程", real_world_tasks: "真实任务",
  tool_use: "工具使用", multimodal_agent: "多模态 Agent"
};

const catColors = {
  skill_evaluation: "#60a5fa", self_evolution: "#34d399", lifelong_learning: "#a78bfa",
  agent_evolution: "#fb923c", benchmark_evolution: "#f472b6", skill_creation: "#22d3ee",
  memory_evolution: "#86efac", skill_ecosystem: "#fbbf24", software_engineering: "#7dd3fc",
  coding_agent: "#c4b5fd", ml_engineering: "#fca5a5", real_world_tasks: "#6ee7b7",
  tool_use: "#fdba74", multimodal_agent: "#93c5fd"
};

let currentFilter = 'all';

function filterBy(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function filterCards() { renderCards(); }

function renderCards() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  benchmarks.forEach(b => {
    const matchCat = currentFilter === 'all' || b.category === currentFilter;
    const matchQ = !q || b.name.toLowerCase().includes(q) || b.full_name.toLowerCase().includes(q) || b.tags.some(t => t.includes(q));
    if (!matchCat || !matchQ) return;
    const card = document.createElement('div');
    card.className = 'card';
    const color = catColors[b.category] || '#94a3b8';
    const arxivLink = b.arxiv ? `<a class="link-btn" href="https://arxiv.org/abs/${b.arxiv}" target="_blank">arXiv</a>` : '';
    const urlLink = b.url ? `<a class="link-btn" href="${b.url}" target="_blank">主页</a>` : '';
    card.innerHTML = `
      <div class="card-header">
        <div class="card-name">${b.name}</div>
        <div class="card-year">${b.year}</div>
      </div>
      <div class="card-full-name">${b.full_name}</div>
      <span class="category-badge cat-${b.category}">${catLabels[b.category] || b.category}</span>
      <div class="card-meta">
        <div class="meta-item">机构: <span>${b.institution}</span></div>
        ${b.tasks ? `<div class="meta-item">任务数: <span>${b.tasks}</span></div>` : ''}
        ${b.domains ? `<div class="meta-item">领域数: <span>${b.domains}</span></div>` : ''}
      </div>
      <div class="domains-list">覆盖: ${b.domain_list.join(' · ')}</div>
      <div class="findings">
        ${b.key_findings.map(f => `<div class="finding">${f}</div>`).join('')}
      </div>
      <div class="tags">${b.tags.map(t => `<span class="tag">#${t}</span>`).join('')}</div>
      <div class="links">${arxivLink}${urlLink}</div>
    `;
    grid.appendChild(card);
  });
}

function renderTaskChart() {
  const withTasks = benchmarks.filter(b => b.tasks).sort((a,b) => b.tasks - a.tasks);
  const max = withTasks[0].tasks;
  const container = document.getElementById('taskChart');
  container.innerHTML = withTasks.map(b => {
    const pct = (b.tasks / max * 100).toFixed(1);
    const color = catColors[b.category] || '#60a5fa';
    return `<div class="bar-row">
      <div class="bar-label">${b.name}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${pct}%;background:${color}"></div>
      </div>
      <div class="bar-value">${b.tasks}</div>
    </div>`;
  }).join('');
}

function renderCatChart() {
  const counts = {};
  benchmarks.forEach(b => { counts[b.category] = (counts[b.category] || 0) + 1; });
  const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]);
  const max = sorted[0][1];
  const container = document.getElementById('catChart');
  container.innerHTML = sorted.map(([cat, cnt]) => {
    const pct = (cnt / max * 100).toFixed(1);
    const color = catColors[cat] || '#60a5fa';
    return `<div class="bar-row">
      <div class="bar-label">${catLabels[cat] || cat}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${pct}%;background:${color}"></div>
      </div>
      <div class="bar-value">${cnt}</div>
    </div>`;
  }).join('');
}

renderTaskChart();
renderCatChart();
renderCards();
</script>
</body>
</html>
