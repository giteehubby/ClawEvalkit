# Nginx configuration for Claw Bench — clawbench.net
# Serves static frontend + proxies API to FastAPI backend

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    charset utf-8;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 30;
    keepalive_requests 1000;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml text/markdown;

    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=run:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=ws:10m;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    upstream backend {
        least_conn;
        server server:8000 max_fails=3 fail_timeout=5s;
        keepalive 32;
    }

    proxy_next_upstream error timeout http_502 http_503;

    # HTTP -> HTTPS redirect
    server {
        listen 80;
        server_name clawbench.net www.clawbench.net;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name clawbench.net www.clawbench.net;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";

        location ~* \.md$ {
            root /usr/share/nginx/html;
            types { text/plain md; }
            add_header Access-Control-Allow-Origin "*";
        }

        location ~* \.sh$ {
            root /usr/share/nginx/html;
            types { text/plain sh; }
            add_header Access-Control-Allow-Origin "*";
        }

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri.html $uri/ /index.html;

            location ~* \.(js|css|png|jpg|ico|svg|woff2)$ {
                expires 7d;
                add_header Cache-Control "public, immutable";
            }
        }

        location /api/ {
            limit_req zone=api burst=50 nodelay;
            limit_conn addr 20;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
            proxy_connect_timeout 10s;
        }

        location /api/runs {
            limit_req zone=run burst=3 nodelay;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /ws/ {
            limit_conn ws 10;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
        }

        location /api/health {
            proxy_pass http://backend;
        }
    }
}
